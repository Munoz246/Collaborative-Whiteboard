<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collaborative Whiteboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="whiteboard-root">
      <div class="whiteboard-toolbar-bar">
        <a href="index.html" class="whiteboard-back-link">Dashboard</a>
        <div class="whiteboard-title">Infinite Whiteboard</div>

        <div class="toolbar whiteboard-toolbar">
          <button id="toolSelectBtn" class="tool-button" type="button" data-tool="select">
            Select
          </button>
          <button id="toolShapeBtn" class="tool-button" type="button" data-tool="shape">
            Shape
          </button>
          <button id="toolPenBtn" class="tool-button" type="button" data-tool="pen">
            Pen
          </button>
          <button id="toolTextBtn" class="tool-button" type="button" data-tool="text">
            Text
          </button>

          <span class="shape-subtoolbar" id="shapeSubtoolbar">
            <button
              id="shapeRectBtn"
              class="tool-button shape-choice active"
              type="button"
              data-shape="rectangle"
            >
              Rectangle
            </button>
            <button
              id="shapeCircleBtn"
              class="tool-button shape-choice"
              type="button"
              data-shape="circle"
            >
              Circle
            </button>
          </span>
        </div>

        <div class="whiteboard-clear">
          <button id="clearCanvasBtn" type="button">Clear</button>
        </div>
      </div>

      <div class="whiteboard-canvas-host">
        <canvas id="whiteboardCanvas"></canvas>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fabric@5.3.0/dist/fabric.min.js"></script>
    <script type="module" src="./whiteboard/main.js"></script>
  </body>
</html>
